name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      sha8: ${{ steps.slug.outputs.sha8 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/uzgidrochat-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/uzgidrochat-backend:${{ steps.slug.outputs.sha8 }}

  verify-image:
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      sha8: ${{ needs.build-and-push.outputs.sha8 }}
      scan-failed: ${{ steps.trivy.outcome == 'failure' }}

    steps:
      - name: Run Trivy vulnerability scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/uzgidrochat-backend:${{ needs.build-and-push.outputs.sha8 }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  rebuild-no-cache:
    runs-on: ubuntu-latest
    needs: [build-and-push, verify-image]
    if: needs.verify-image.outputs.scan-failed == 'true'
    outputs:
      sha8: ${{ needs.build-and-push.outputs.sha8 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Rebuild without cache
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          pull: true
          no-cache: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/uzgidrochat-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/uzgidrochat-backend:${{ needs.build-and-push.outputs.sha8 }}

      - name: Re-scan with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/uzgidrochat-backend:${{ needs.build-and-push.outputs.sha8 }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  trigger-watchtower:
    runs-on: ubuntu-latest
    needs: [verify-image, rebuild-no-cache]
    if: |
      always() &&
      needs.verify-image.result == 'success' &&
      (needs.rebuild-no-cache.result == 'success' || needs.rebuild-no-cache.result == 'skipped')

    steps:
      - name: Trigger Watchtower Update
        run: |
          curl -sf -H "Authorization: Bearer ${{ secrets.WATCHTOWER_SECRET }}" \
            https://${{ secrets.WATCHTOWER_HOST }}/v1/update
